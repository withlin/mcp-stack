{{- if and .Values.victoriaMetricsMcp.enabled .Values.victoriaMetricsMcp.secret.create -}}
{{- $component := "victoriametrics-mcp" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-stack.componentSecretName" (dict "context" . "component" $component "secret" .Values.victoriaMetricsMcp.secret) }}
  labels:
    {{- include "mcp-stack.componentLabels" (dict "context" . "component" $component) | nindent 4 }}
type: Opaque
{{- $root := . -}}
{{- $data := dict -}}
{{- range $key := sortAlpha (keys $root.Values.victoriaMetricsMcp.env) }}
{{- $value := index $root.Values.victoriaMetricsMcp.env $key -}}
{{- if $value }}
{{- $_ := set $data $key (printf "%v" $value) -}}
{{- end }}
{{- end }}
{{- range $key := sortAlpha (keys $root.Values.victoriaMetricsMcp.secret.data) }}
{{- $value := index $root.Values.victoriaMetricsMcp.secret.data $key -}}
{{- if $value }}
{{- $_ := set $data $key (printf "%v" $value) -}}
{{- end }}
{{- end }}
{{- if gt (len $data) 0 }}
stringData:
{{- range $key := sortAlpha (keys $data) }}
{{- $value := index $data $key -}}
{{- if $value }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- end }}
{{- else }}
stringData: {}
{{- end }}
{{- end }}
