{{- if .Values.grafanaMcp.enabled -}}
{{- $component := "grafana-mcp" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-stack.componentFullname" (dict "context" . "component" $component) }}
  labels:
    {{- include "mcp-stack.componentLabels" (dict "context" . "component" $component) | nindent 4 }}
spec:
  replicas: {{ .Values.grafanaMcp.replicaCount }}
  selector:
    matchLabels:
      {{- include "mcp-stack.componentSelectorLabels" (dict "context" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-stack.componentSelectorLabels" (dict "context" . "component" $component) | nindent 8 }}
      {{- with .Values.grafanaMcp.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.grafanaMcp.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: grafana-mcp
          {{ $image := .Values.grafanaMcp.image.repository }}
          {{ $tag := .Values.grafanaMcp.image.tag }}
          image: "{{ if $tag }}{{ printf "%s:%s" $image $tag }}{{ else }}{{ $image }}{{ end }}"
          imagePullPolicy: {{ .Values.grafanaMcp.image.pullPolicy }}
          {{- with .Values.grafanaMcp.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.grafanaMcp.service.port }}
              protocol: TCP
          {{- $root := . -}}
          {{- $envList := list -}}
          {{- if not (or $root.Values.grafanaMcp.secret.create $root.Values.grafanaMcp.secret.name) }}
          {{- range $key := sortAlpha (keys $root.Values.grafanaMcp.env) }}
          {{- $value := index $root.Values.grafanaMcp.env $key -}}
          {{- if $value }}
          {{- $envList = append $envList (dict "name" $key "value" (printf "%v" $value)) -}}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- range .Values.grafanaMcp.extraEnv }}
          {{- $envList = append $envList . -}}
          {{- end }}
          {{- if gt (len $envList) 0 }}
          env:
            {{- toYaml $envList | nindent 12 }}
          {{- end }}
          {{- $envFrom := list -}}
          {{- if or .Values.grafanaMcp.secret.create .Values.grafanaMcp.secret.name }}
          {{- $secretName := include "mcp-stack.componentSecretName" (dict "context" . "component" $component "secret" .Values.grafanaMcp.secret) -}}
          {{- $envFrom = append $envFrom (dict "secretRef" (dict "name" $secretName)) -}}
          {{- end }}
          {{- range .Values.grafanaMcp.envFrom }}
          {{- $envFrom = append $envFrom . -}}
          {{- end }}
          {{- if gt (len $envFrom) 0 }}
          envFrom:
            {{- toYaml $envFrom | nindent 12 }}
          {{- end }}
          {{- with .Values.grafanaMcp.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.grafanaMcp.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.grafanaMcp.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.grafanaMcp.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.grafanaMcp.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.grafanaMcp.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.grafanaMcp.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
