{{- if .Values.grafanaMcp.enabled -}}
{{- $component := "grafana-mcp" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-stack.componentFullname" (dict "context" . "component" $component) }}
  labels:
    {{- include "mcp-stack.componentLabels" (dict "context" . "component" $component) | nindent 4 }}
spec:
  type: {{ .Values.grafanaMcp.service.type }}
  ports:
    - name: http
      port: {{ .Values.grafanaMcp.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "mcp-stack.componentSelectorLabels" (dict "context" . "component" $component) | nindent 4 }}
{{- end }}
