    VM_INSTANCE_ENTRYPOINT: ""
    VM_INSTANCE_TYPE: ""
    VM_INSTANCE_BEARER_TOKEN: ""
    VM_INSTANCE_HEADERS: ""
    VMC_API_KEY: ""
    MCP_SERVER_MODE: "sse"
    MCP_LISTEN_ADDR: ":8080"
    MCP_DISABLED_TOOLS: ""
    MCP_DISABLE_RESOURCES: ""
    MCP_HEARTBEAT_INTERVAL: ""
    VM_DEFAULT_TENANT_ID: ""
  args: []
  extraEnv: []
  envFrom: []
  secret:
    create: false
    name: ""
    data: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  livenessProbe:
    tcpSocket:
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  readinessProbe:
    tcpSocket:
      port: http
    initialDelaySeconds: 5
