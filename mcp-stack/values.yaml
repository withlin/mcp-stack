grafanaMcp:
  enabled: true
  replicaCount: 1
  image:
    repository: grafana/mcp-grafana
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  env:
    GRAFANA_URL: ""
    GRAFANA_SERVICE_ACCOUNT_TOKEN: ""
    GRAFANA_USERNAME: ""
    GRAFANA_PASSWORD: ""
    GRAFANA_ORG_ID: ""
    GRAFANA_EXTRA_HEADERS: ""
  args: []
  extraEnv: []
  envFrom: []
  secret:
    create: false
    name: ""
    data: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  livenessProbe:
    tcpSocket:
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  readinessProbe:
    tcpSocket:
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3

victoriaMetricsMcp:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/victoriametrics-community/mcp-victoriametrics
